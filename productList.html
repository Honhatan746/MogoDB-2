<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product List</title>
  <link href="./bootstrap/bootstrap-5.3.8-dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./asset/icon/themify-icons-font/themify-icons/themify-icons.css">\
  <link rel="stylesheet" href="./css/responsible.css">
</head>
<body>
    <!--Header -->
    <header>
        <div class="header_sub">
            <p>Sản phẩm thân thiện với trẻ em</p>
            <p>Hàng bán chạy nhất thời đại</p>
        </div>
        <div class="header_main">
            <div class="menu-md">
                <div 
                class="menu-ti link-hover menu-ti-js"><i class="ti-menu"></i>    
                </div>
                <a href="./index.html"><img class="wid-logo sub_logo" src="./asset/image/Logo/iuh.png" alt="Logo"></a>
            </div>
            <a href="./index.html"><img class="wid-logo main_logo" src="./asset/image/Logo/iuh.png" alt="Logo"></a>
            <div class="header_menu">
                <!-- Cho Js reder ra theo từng role -->
            </div>
            <div class="header_tool">
                <!-- Cho Js reder ra theo từng role -->
            </div>
        </div>
    </header>
    <!-- Nav -->
             <!-- Navbar  -->
     <nav class="navbar" style="margin-top: 77px;">
            <ul style="margin: 0;">
                <i><li><a href="./index.html">Trang chủ</a></li></i>
                <i><li>Quản lý sản phẩm</li></i>
            </ul>
        </nav>
  <!-- Content -->
  <div class="container-md container-fluid mt-5 mb-5">
    <h1 class="font-heading heading-pink fw-bold text-uppercase mb-4 text-center text-md-start">
        <i class="bi bi-box-seam me-2"></i>Danh sách sản phẩm
    </h1>

    <div class="row mb-4 g-3 align-items-center">
        <div class="col-12 col-md-6 col-lg-4">
            <div class="input-group">
                <input type="text" id="findProductId" class="form-control font-title" placeholder="Nhập mã hoặc tên sản phẩm...">
                <button class="btn seachProductStaff" onclick="findProduct()">
                    <i class="ti-search"></i>
                </button>
            </div>
        </div>
        <div class="col-12 col-md-6 col-lg-8 text-md-end text-center">
            <a href="./addprodcut.html" class="btn addproduct shadow-sm">
                Thêm sản phẩm
            </a>
        </div>
    </div>

    <div class="border-0 shadow-sm overflow-hidden">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="header-prodcut-list">
                    <tr>
                        <th class="ps-4">ProductID</th>
                        <th>Name</th>
                        <th>Price</th>
                        <th>Category</th>
                        <th class="text-center pe-4">Actions</th>
                    </tr>
                </thead>
                <tbody id="productTable">
                    </tbody>
            </table>
        </div>
    </div>
</div>

  <div class="modal fade" id="variantModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title font-heading heading-pink fw-bold">
                    <i class="bi bi-layers-half me-2"></i>Quản lý biến thể sản phẩm
                </h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            
            <div class="modal-body p-4">
                <input type="hidden" id="variantProductId">
                
                <div class="table-responsive mb-4 stats-table-container">
                    <table class="table align-middle mb-0">
                        <thead class="header-prodcut-list">
                            <tr>
                                <th class="font-title ps-4">Size</th>
                                <th class="font-title">Màu sắc</th>
                                <th class="font-title">Số lượng kho</th>
                                <th class="font-title pe-4 text-center">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="variantTable">
                            </tbody>
                    </table>
                </div>
                
                <hr class="my-4" style="opacity: 0.1;">
                
                <div class="p-3 rounded-4" style="background-color: #fcfaff; border: 1px dashed #d7c4ff;">
                    <h3 class="mb-3 fw-bold" style="color: var(--primary-color); font-size: 1.6rem;">Thêm biến thể mới</h3>
                    <div class="row g-3 align-items-end">
                        <div class="col-md-3">
                            <label class="small fw-bold mb-2 d-block font-title">Kích cỡ</label>
                            <input id="vSize" class="form-control" placeholder="Ví dụ: XL, 42...">
                        </div>
                        <div class="col-md-3">
                            <label class="small fw-bold mb-2 d-block font-title">Màu sắc</label>
                            <input id="vColor" class="form-control" placeholder="Ví dụ: Đỏ, Trắng...">
                        </div>
                        <div class="col-md-3">
                            <label class="small fw-bold mb-2 d-block font-title">Số lượng</label>
                            <input id="vStock" type="number" class="form-control" placeholder="0">
                        </div>
                        <div class="col-md-3">
                            <div class="d-grid d-sm-flex gap-2">
                                <button class="btn addvariant flex-grow-1" onclick="addVariant()">
                                    <i class="bi bi-plus-lg me-1"></i> Thêm
                                </button>
                                <button class="btn btnChange flex-grow-1" onclick="saveAllChanges()">
                                    <i class="bi bi-cloud-check me-1"></i> Lưu tất cả
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
    <!-- Search -->
     <div class="search js_search">
        <div class="search_body js-search_body">
            <a href=""><img class="wid-logo-big " src="./asset/image/Logo/iuh.png" alt=""></a>
            <div class="search_content">
                <div class="search_input">
                    <input placeholder="Search your favorate products..." type="text" id="serach_input">
                    
                    <div class="" id="listProductSearch">
                              <!--Render ra sản phẩm ở đây  -->
                    </div>
                </div>
            </div>
            <div class="header_tool searchTool">
                <!-- Render ra ở đây -->
            </div>
        </div>
     </div>
     <!-- End Search -->
      <!-- Menu Mobile -->
       <div class="menu-mobile menu-mobile-js">
            <div class="menu-mobile_body" > 
                    <div class="menu-mobile_header">
                        <div class="wid-logo"><img src="./asset/image/Logo/iuh.png" alt="Logo"></div>
                        <h1>Catalogue</h1>
                    </div>
                    <div class="header_menu alignItem-star">
                        <ul class=" menu-tools flex-colum menu-tools-mobile">
                            <!--Render Js code-->
                        </ul>
                    </div>
                    <div class="menu-mobile_img ">
                        <div><img src="./asset/image/Slide/anh_tet.webp" alt="anhTet"></div>
                        <div><img src="./asset/image/Slide/anh_trung_thu.webp" alt="anhTrungThu"></div>
                    </div>
            </div>
       </div>
       <!-- End Menu Mobile -->
        <!-- Message -->
        <div id="globalModal" class="g-modal">
    <div class="g-modal-overlay"></div>
    <div class="g-modal-box">
        <div class="g-modal-icon" id="gModalIcon"></div>
        <h2 id="gModalTitle" class="font-heading">Thông báo</h2>
        <p id="gModalMessage" class="font-title"></p>
        <div class="g-modal-buttons">
            <button class="g-btn g-btn-cancel" id="gModalCancel">Hủy</button>
            <button class="g-btn g-btn-ok" id="gModalOk">Đồng ý</button>
        </div>
    </div>
       <script src="./js/modal.js"></script>
  <script src="./js/productList.js"> </script>
  <script src="./bootstrap/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"> </script>
</body>
</html>
