<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product List</title>
  <link href="./bootstrap/bootstrap-5.3.8-dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>Product List</h2>
      <a href="addprodcut.html" class="btn btn-primary">+ Add Product</a>
    </div>

    <table class="table table-bordered table-hover">
      <thead class="table-dark">
        <tr>
          <th>ProductID</th>
          <th>Name</th>
          <th>Price</th>
          <th>Category</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="productTable">
        <!-- Render product here -->
      </tbody>
    </table>
  </div>

  <div class="modal fade" id="variantModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        
        <div class="modal-header">
          <h5 class="modal-title"></h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        
        <div class="modal-body">
          
          <input type="hidden" id="variantProductId">
          
          <!-- LIST VARIANT -->
          <table class="table table-bordered">
            <thead>
              <tr>
                <th>Size</th>
                <th>Color</th>
                <th>Stock</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="variantTable"></tbody>
          </table>
          
          <hr>
          
          <!-- ADD VARIANT -->
          <div class="row">
            <div class="col">
              <input id="vSize" class="form-control" placeholder="Size">
            </div>
            <div class="col">
              <input id="vColor" class="form-control" placeholder="Color">
            </div>
            <div class="col">
              <input id="vStock" type="number" class="form-control" placeholder="Stock">
            </div>
            <div class="col">
              <button class="btn btn-primary" onclick="addVariant()">Add</button>
            </div>
          </div>
          
        </div>
        
      </div>
    </div>
  </div>
  <script src="./js/productList.js"> </script>
  <script src="./bootstrap/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"> </script>
</body>
</html>
