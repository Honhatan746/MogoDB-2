<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Product</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="./bootstrap/bootstrap-5.3.8-dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      background: #f5f6fa;
    }

    .card{
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .title{
      font-weight: 700;
      color: #333;
    }

    /* preview ảnh */
    .remove-btn {
      opacity: 0;
      transition: 0.2s;
    }

    .card:hover .remove-btn {
      opacity: 1;
    }
  </style>
</head>

<body>

<div class="container mt-5">
  <div class="card p-4">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="title">Edit Product</h2>
      <a href="productList.html" class="btn btn-secondary">← Back</a>
    </div>

    <form id="editForm">

      <input type="hidden" id="productId">

      <div class="row">

        <!-- LEFT -->
        <div class="col-md-6">

          <div class="mb-3">
            <label class="form-label">Product Name</label>
            <input type="text" id="name" class="form-control">
          </div>

          <div class="mb-3">
            <label class="form-label">Price</label>
            <input type="number" id="price" class="form-control">
          </div>

          <div class="mb-3">
            <label class="form-label">Category</label>
            <select id="category" class="form-select"></select>
          </div>

          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea id="description" class="form-control" rows="3"></textarea>
          </div>

        </div>

        <!-- RIGHT -->
        <div class="col-md-6">

          <!-- IMAGE INPUT -->
          <div class="mb-3">
            <label class="form-label">Image URLs (phân cách dấu ,)</label>
            <input 
              type="text" 
              id="images" 
              class="form-control" 
              placeholder="https://a.jpg, https://b.png"
            >

            <!-- PREVIEW GRID -->
            <div class="row mt-3" id="preview"></div>

          </div>

        </div>

      </div>

      <button class="btn btn-success w-100 mt-3">Update Product</button>

    </form>

  </div>
</div>

<script src="./js/editProduct.js"></script>

</body>
</html>
