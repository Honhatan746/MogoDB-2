<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Product</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <!-- Header -->
       <!--Header -->
    <header>
        <div class="header_sub">
            <p>Kids’s products – gentle and comfortable</p>
            <p>Best-selling products on the market</p>
        </div>
        <div class="header_main">
            <div class="menu-md">
                <div 
                class="menu-ti link-hover menu-ti-js"><i class="ti-menu"></i>    
                </div>
                <a href="./index.html"><img class="wid-logo sub_logo" src="./asset/image/Logo/iuh.png" alt="Logo"></a>
            </div>
            <a href="./index.html"><img class="wid-logo main_logo" src="./asset/image/Logo/iuh.png" alt="Logo"></a>
            <div class="header_menu">
                <!-- Cho Js reder ra theo từng role -->
            </div>
            <div class="header_tool">
                <!-- Cho Js reder ra theo từng role -->
            </div>
        </div>
    </header>
   <!-- Content -->
  <div class="container mt-5">
    <h2 class="mb-4">Add Product (Staff)</h2>

    <form id="productForm" class="card p-4">
      <div class="mb-3">
        <label class="form-label">Product Name</label>
        <input type="text" name="name" id="nameProduct" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Price</label>
        <input type="number" name="price" id="priceProduct" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Stock</label>
        <input type="number" name="stock" id="stockProduct" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">CategoryID</label>
        <select name="categoryId" id="categoryID" class="form-select" required>
          <option value="">-- Select Category --</option>
        </select>
      </div>

        <div class="mb-3">
        <label class="form-label">Size</label>
        <input type="text" id="size" class="form-control" placeholder="S, M, L">
        </div>

        <div class="mb-3">
        <label class="form-label">Color</label>
        <input type="text" id="color" class="form-control" placeholder="RED, BLUE">
        </div>

        <div class="mb-3">
          <label>Nhập URL ảnh (cách nhau bằng dấu ,)</label>
          <input type="text" id="imageUrls" class="form-control" placeholder="https://a.jpg, https://b.png">
        </div>

        <div class="row" id="preview"></div>
            <p>Tổng ảnh: <span id="count">0</span></p>
        <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea name="description" id="descriptionProduct" class="form-control" rows="3"></textarea>
      </div>

      <div class="mb-3">
        <label class="form-label">Status</label>
        <select name="status" class="form-select">
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
        </select>
      </div>

      <button type="submit" class="btn btn-success">Add Product</button>
      <a href="./productList.html" class="btn btn-secondary">Back</a>
    </form>
  </div>
  <script src="./js/addProduct.js"></script>
</body>
</html>
